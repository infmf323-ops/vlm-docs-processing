name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Установка лёгких зависимостей
        # torch/transformers/boto3/fitz не нужны — подменяются заглушками в conftest.
        run: pip install -r requirements-dev.txt
      - name: Запуск тестов
        run: pytest tests/ -v

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Установка зависимостей
        run: npm ci
      - name: Проверка типов
        run: npx tsc --noEmit -p tsconfig.app.json
      - name: Сборка
        run: npm run build
